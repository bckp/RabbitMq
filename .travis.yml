language: php

cache:
    directories:
        - $HOME/.composer/cache

php:
  - 7.2
  - 7.3
  - 7.4

services:
  - rabbitmq

env:
  - PHP_BIN=php
  - PHP_BIN=php-cgi

before_install:
  - travis_retry composer self-update
  - wget -O /tmp/composer-nette https://raw.githubusercontent.com/Kdyby/TesterExtras/master/bin/composer-nette.php
  - php /tmp/composer-nette

install:
  - travis_retry composer install --no-progress --prefer-dist

script:
  - vendor/bin/tester $COVERAGE -s -p ${TESTER_RUNTIME:-php} -c ./tests/php.ini-unix ./tests/KdybyTests/

after_script:
  - if [ "$COVERAGE" != "" ]; then php /tmp/coveralls.phar --verbose --config tests/.coveralls.yml || true; fi

after_failure:
  - 'for i in $(find ./tests -name \*.actual); do echo "--- $i"; cat $i; echo; echo; done'

jobs:
  include:
    - name: Lowest Dependencies
      env: PHP_BIN=php
      install: travis_retry composer update --no-progress --prefer-dist --prefer-lowest --prefer-stable

    - name: Lint
      install:
        - travis_retry composer create-project jakub-onderka/php-parallel-lint temp/php-parallel-lint --no-interaction --no-progress
      script:
        - php temp/php-parallel-lint/parallel-lint src

    - stage: Code Coverage
      script:
        - vendor/bin/tester -p phpdbg tests -s --coverage ./coverage.xml --coverage-src ./src
      after_script:
        - wget https://github.com/satooshi/php-coveralls/releases/download/v1.0.1/coveralls.phar
        - php coveralls.phar --verbose --config tests/.coveralls.yml

  allow_failures:
    - stage: Code Coverage

addons:
  apt:
    packages:
      - rabbitmq-server